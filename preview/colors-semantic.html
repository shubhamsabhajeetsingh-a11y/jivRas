<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #F5F3EE; font-family: 'DM Sans', sans-serif; display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; gap: 5px; }
  .color-block { width: 90px; height: 56px; border-radius: 9px; }
  .swatch-label { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; color: #1A1A1A; }
  .swatch-hex { font-size: 10px; color: #7A7A7A; }
</style>
</head>
<body>
  <div class="swatch"><div class="color-block" style="background:#F5F3EE;border:1px solid #E2DDD6;"></div><div class="swatch-label">--bg</div><div class="swatch-hex">#F5F3EE</div></div>
  <div class="swatch"><div class="color-block" style="background:#FFFFFF;border:1px solid #E2DDD6;"></div><div class="swatch-label">--surface</div><div class="swatch-hex">#FFFFFF</div></div>
  <div class="swatch"><div class="color-block" style="background:#E2DDD6;"></div><div class="swatch-label">--border</div><div class="swatch-hex">#E2DDD6</div></div>
  <div class="swatch"><div class="color-block" style="background:#1A1A1A;"></div><div class="swatch-label">--text</div><div class="swatch-hex">#1A1A1A</div></div>
  <div class="swatch"><div class="color-block" style="background:#7A7A7A;"></div><div class="swatch-label">--text-muted</div><div class="swatch-hex">#7A7A7A</div></div>
  <div class="swatch"><div class="color-block" style="background:#D57937;"></div><div class="swatch-label">--accent</div><div class="swatch-hex">#D57937</div></div>
  <div class="swatch"><div class="color-block" style="background:#BF6929;"></div><div class="swatch-label">--accent-hover</div><div class="swatch-hex">#BF6929</div></div>
  <div class="swatch"><div class="color-block" style="background:#E8F0EA;border:1px solid #E2DDD6;"></div><div class="swatch-label">--accent-light</div><div class="swatch-hex">#E8F0EA</div></div>
  <div class="swatch"><div class="color-block" style="background:#D4820A;"></div><div class="swatch-label">--amber</div><div class="swatch-hex">#D4820A</div></div>
  <div class="swatch"><div class="color-block" style="background:#FEF3DC;border:1px solid #E2DDD6;"></div><div class="swatch-label">--amber-light</div><div class="swatch-hex">#FEF3DC</div></div>
</body>
</html>
