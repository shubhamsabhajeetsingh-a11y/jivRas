<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #F5F3EE; font-family: 'DM Sans', sans-serif; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .color-block { width: 110px; height: 72px; border-radius: 10px; display: flex; align-items: flex-end; padding: 8px; }
  .swatch-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: #1A1A1A; }
  .swatch-hex { font-size: 11px; color: #7A7A7A; }
  .logo-row { display: flex; align-items: center; gap: 8px; background: white; border-radius: 12px; padding: 14px 18px; border: 1px solid #E2DDD6; }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 0.02em; }
  .logo-text .jiv { color: #2E6B35; }
  .logo-text .ras { color: #E8920A; }
  .logo-sub { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #7A7A7A; margin-top: 2px; }
  .logo-tagline { font-family: 'DM Sans', sans-serif; font-size: 10px; color: #7A7A7A; font-style: italic; margin-top: 1px; }
  .divider { width: 1px; height: 40px; background: #E2DDD6; margin: 0 4px; }
</style>
</head>
<body>
<div class="logo-row">
  <div>
    <div class="logo-text"><span class="jiv">Jiv</span><span class="ras">Ras</span></div>
    <div class="logo-sub">Natural</div>
    <div class="logo-tagline">Essence of Life, Born from the Soil</div>
  </div>
  <div class="divider"></div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div class="swatch">
      <div class="color-block" style="background:#2E6B35;"></div>
      <div class="swatch-label">Brand Green</div>
      <div class="swatch-hex">#2E6B35 · "Jiv"</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div class="swatch">
      <div class="color-block" style="background:#E8920A;"></div>
      <div class="swatch-label">Brand Orange</div>
      <div class="swatch-hex">#E8920A · "Ras"</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div class="swatch">
      <div class="color-block" style="background:#D57937;"></div>
      <div class="swatch-label">Accent</div>
      <div class="swatch-hex">#D57937 · UI Primary</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div class="swatch">
      <div class="color-block" style="background:#F5F3EE; border:1px solid #E2DDD6;"></div>
      <div class="swatch-label">Background</div>
      <div class="swatch-hex">#F5F3EE · Warm Off-White</div>
    </div>
  </div>
</div>
</body>
</html>
