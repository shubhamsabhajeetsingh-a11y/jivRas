<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #F5F3EE; font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; flex-direction: column; gap: 4px; }
  .tag { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #7A7A7A; }
  .d1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; color: #1A1A1A; line-height: 1.15; }
  .d2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: #1A1A1A; line-height: 1.2; }
  .d3 { font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 700; color: #1A1A1A; }
  .d4 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #1A1A1A; }
  .d5 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #1A1A1A; }
  .d6 { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #7A7A7A; }
  .brand-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.04em; }
  .brand-name .jiv { color: #2E6B35; }
  .brand-name .ras { color: #E8920A; }
  hr { border: none; border-top: 1px solid #E2DDD6; margin: 0; }
</style>
</head>
<body>
  <div class="row"><span class="tag">H1 · Syne 28/700</span><div class="d1">Fresh Groceries, Direct From Nature</div></div>
  <hr>
  <div class="row"><span class="tag">H2 · Syne 22/700</span><div class="d2">Inventory Dashboard</div></div>
  <hr>
  <div class="row"><span class="tag">H3 · Syne 19/700 · Topbar</span><div class="d3">Products</div></div>
  <hr>
  <div class="row"><span class="tag">H4 · Syne 18/700 · Metric</span><div class="d4">₹24,850</div></div>
  <hr>
  <div class="row"><span class="tag">H5 · Syne 15/700 · Section Title</span><div class="d5">Grains & Pulses</div></div>
  <hr>
  <div class="row"><span class="tag">H6 · Syne 11/700 Caps · Column Header</span><div class="d6">Product Name</div></div>
  <hr>
  <div class="row"><span class="tag">Brand Wordmark · Syne 22/700</span><div class="brand-name"><span class="jiv">Jiv</span><span class="ras">Ras</span></div></div>
</body>
</html>
