<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: #F5F3EE; font-family: 'DM Sans', sans-serif; }
  .topbar { background: white; border-bottom: 1px solid #E2DDD6; padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
  .topbar-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: #1A1A1A; flex: none; }
  .search-wrap { flex: 1; max-width: 280px; position: relative; margin-left: auto; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  .search-wrap input { width: 100%; padding: 7px 12px 7px 30px; border: 1px solid #E2DDD6; border-radius: 8px; font-size: 12px; background: #F5F3EE; font-family: 'DM Sans', sans-serif; color: #1A1A1A; outline: none; box-sizing: border-box; }
  .view-toggle { display: flex; border: 1px solid #E2DDD6; border-radius: 8px; overflow: hidden; }
  .vt-btn { padding: 6px 10px; cursor: pointer; background: transparent; border: none; color: #7A7A7A; display: flex; align-items: center; font-size: 13px; }
  .vt-btn.active { background: #D57937; color: white; }
  .add-btn { background: #D57937; color: white; border: none; padding: 7px 16px; border-radius: 8px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">Products</div>
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Search products…">
  </div>
  <div class="view-toggle">
    <button class="vt-btn active">⊞</button>
    <button class="vt-btn">☰</button>
  </div>
  <button class="add-btn">+ Add Product</button>
</div>
</body>
</html>
