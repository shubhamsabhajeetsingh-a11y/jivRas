<div class="background-blur"></div>

<div class="product-container">
  
  <div class="header">
    <h2>🛒 JivRas Groceries</h2>
    
    <div class="header-actions">
      <button *ngIf="isEmployee" 
              (click)="navigateToAddProduct()" 
              class="add-btn">
        + Add Product
      </button>

      <button (click)="navigateToCart()" class="cart-btn">
        🛒 Cart
        <span *ngIf="cartItemCount > 0" class="cart-badge">{{ cartItemCount }}</span>
      </button>

      <app-user-profile *ngIf="isLoggedIn"></app-user-profile>

      <a *ngIf="!isLoggedIn" routerLink="/login" class="login-link-btn">
        Login
      </a>
    </div>
  </div>
  
  <div class="search-container" style="margin: 0 2rem 2rem 2rem; text-align: center;">
    <input type="text" [(ngModel)]="searchTerm" (ngModelChange)="filterProducts()" placeholder="Search products by name or description..." style="width: 100%; max-width: 600px; padding: 0.8rem 1rem; border-radius: 25px; border: 1px solid #ddd; font-size: 1rem; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
  </div>

  <div *ngIf="filteredProducts.length === 0" class="empty-state">
    <p>No products found. Please try a different search or add some!</p>
  </div>

  <div class="product-grid">
    
    <div *ngFor="let product of filteredProducts" class="product-card">
      
      <div class="image-container">
        <img [src]="product.imageUrl || 'https://placehold.co/200'" 
             alt="{{ product.name }}" 
             class="product-img">
      </div>

      <div class="product-details">
        <h3>{{ product.name }}</h3>
        
        <p class="description">{{ product.description }}</p>
        
        <div class="info-row">
          <span class="stock-badge" [class.low-stock]="product.availableStockKg < 10">
            Stock: {{ product.availableStockKg }} kg
          </span>
        </div>

        <div class="price-row">
          <span class="price">₹{{ product.pricePerKg }} <small>/kg</small></span>
          
          <button *ngIf="!isEmployee"
                  class="buy-btn"
                  [class.added]="addedProductId === product.id"
                  [disabled]="addedProductId === product.id || product.availableStockKg <= 0"
                  (click)="addToCart(product)">
            {{ addedProductId === product.id ? '✓ Added!' : 'Add to Cart' }}
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
