<div class="create-users-container">
  <h2>Create New Account</h2>
  
  <form [formGroup]="createUserForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" formControlName="username" type="text" placeholder="Enter username">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" formControlName="password" type="password" placeholder="Enter password">
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <input id="role" formControlName="role" type="text" placeholder="e.g. USER, ADMIN">
    </div>

    <button type="submit" [disabled]="createUserForm.invalid">Create User</button>
  </form>

  <div class="success-message" *ngIf="successMessage">
    {{ successMessage }}
  </div>
  
  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>
</div>
