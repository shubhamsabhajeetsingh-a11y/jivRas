<div class="form-container">
  <h2>Add New Inventory</h2>
  
  <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label>Product Name</label>
      <input formControlName="name" type="text" placeholder="e.g. Basmati Rice">
    </div>

    <div class="form-group">
      <label>Description</label>
      <input formControlName="description" type="text" placeholder="Product details...">
    </div>

    <div class="row" style="display: flex; gap: 15px;">
      <div class="form-group half" style="flex: 1;">
        <label>Price (₹ per Kg)</label>
        <input formControlName="pricePerKg" type="number">
      </div>
      <div class="form-group half" style="flex: 1;">
        <label>Stock (Kg)</label>
        <input formControlName="availableStockKg" type="number">
      </div>
    </div>

    <div class="form-group" style="margin-top: 15px;">
      <label>Product Image</label>
      <input type="file" (change)="onFileSelected($event)" accept="image/*">
    </div>

    <p *ngIf="errorMessage" style="color: red; text-align: center;">{{ errorMessage }}</p>
    <p *ngIf="successMessage" style="color: green; text-align: center;">{{ successMessage }}</p>

    <button type="submit" 
            [disabled]="productForm.invalid || !selectedFile"
            style="width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px;">
      Add Product & Image
    </button>
  </form>
</div>
